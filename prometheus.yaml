# ============================================================
# ⚙️ CONFIGURATION INSTRUCTIONS
# ============================================================
# Before deploying this file, update the following:
#
# 1. YOUR_IP_ADDRESS
#    - Replace with the IPs of external metric sources:
#      - Node Exporters
#      - OTEL Collector
#    - Examples:
#      - YOUR_IP_ADDRESS:9100 (node_exporter)
#      - YOUR_IP_ADDRESS:8889 (otel collector)
#
# 2. Cluster Label
#    - Current: dev-k8s-cluster
#    - Update if you want environment-specific labelling
#
# 3. Storage Size
#    - Default: 5Gi PVC + 5GB retention
#    - Adjust depending on disk availability
#
# 4. Retention Policy
#    - Time: 7d
#    - Size: 5GB
#    - Tune based on how long you want to retain metrics
#
# 5. Namespace
#    - Default: plex
#    - Update if deploying elsewhere
#
# 6. kube-state-metrics
#    - Assumes service exists in kube-system namespace:
#      kube-state-metrics.kube-system:8080
#
# ============================================================

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-pvc
  namespace: plex
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 5Gi

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: plex
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: dev-k8s-cluster

    scrape_configs:

      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9091"]

      - job_name: plex
        static_configs:
          - targets: ["prometheus-plex-exporter-service:9000"]

      - job_name: cadvisor
        static_configs:
          - targets: ["cadvisor:8080"]

      - job_name: otel-plex-collector
        metrics_path: /metrics
        static_configs:
          - targets: ["YOUR_IP_ADDRESS:8889"]

      - job_name: node_exporter_m2
        static_configs:
          - targets: ["YOUR_IP_ADDRESS:9100"]

      - job_name: node_exporter_m1
        static_configs:
          - targets: ["YOUR_IP_ADDRESS:9100"]

      - job_name: kube-state-metrics
        static_configs:
          - targets: ["kube-state-metrics.kube-system:8080"]
        metric_relabel_configs:
          - target_label: cluster
            replacement: "dev-k8s-cluster"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: plex
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      securityContext:
        fsGroup: 65534
      containers:
        - name: prometheus
          image: prom/prometheus:v3.10.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"

            # Retention limits (prevents disk exhaustion)
            - "--storage.tsdb.retention.time=7d"
            - "--storage.tsdb.retention.size=5GB"

            - "--storage.tsdb.wal-compression"
            - "--web.enable-lifecycle"
            - "--web.listen-address=0.0.0.0:9091"

          ports:
            - containerPort: 9091

          volumeMounts:
            - name: prometheus-storage
              mountPath: /prometheus
            - name: prometheus-config
              mountPath: /etc/prometheus

      volumes:
        - name: prometheus-storage
          persistentVolumeClaim:
            claimName: prometheus-pvc
        - name: prometheus-config
          configMap:
            name: prometheus-config

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  namespace: plex
spec:
  type: LoadBalancer
  selector:
    app: prometheus
  ports:
    - port: 30901
      targetPort: 9091
