# ============================================================
# ⚙️ CONFIGURATION INSTRUCTIONS
# ============================================================
# Before deploying this file, update the following values:
#
# 1. YOUR_API_KEY
#    - Replace with your actual API keys from:
#      - Radarr (Settings → General → API Key)
#      - Sonarr (Settings → General → API Key)
#
# 2. Prometheus URL (if changed)
#    - Default: http://prometheus-service:30901
#    - Only change if your service name or port differs
#
# 3. Namespace
#    - Currently set to: plex
#    - Update if deploying to a different namespace
#
# 4. Dashboards ConfigMap
#    - Ensure 'grafana-dashboards' ConfigMap exists BEFORE deploying
#    - Otherwise Grafana pod will fail to start
#
# ============================================================

apiVersion: v1
kind: Secret
metadata:
  name: radarr-secret
  namespace: plex
type: Opaque
stringData:
  RADARR_API_KEY: "YOUR_API_KEY"
---
apiVersion: v1
kind: Secret
metadata:
  name: sonarr-secret
  namespace: plex
type: Opaque
stringData:
  SONARR_API_KEY: "YOUR_API_KEY"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: plex
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: plex
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-service:30901
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-providers
  namespace: plex
data:
  providers.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: Plex-Monitoring
        type: file
        disableDeletion: false
        editable: true
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: plex
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
        environment: Dev
        version: "0.4"
    spec:
      securityContext:
        fsGroup: 472
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          env:
            - name: GF_INSTALL_PLUGINS
              value: yesoreyeram-infinity-datasource
            - name: RADARR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: radarr-secret
                  key: RADARR_API_KEY
            - name: SONARR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sonarr-secret
                  key: SONARR_API_KEY
          volumeMounts:
            - name: grafana-storage
              mountPath: /var/lib/grafana
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: grafana-dashboard-providers
              mountPath: /etc/grafana/provisioning/dashboards
            - name: grafana-dashboards
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: grafana-storage
          persistentVolumeClaim:
            claimName: grafana-pvc
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        - name: grafana-dashboard-providers
          configMap:
            name: grafana-dashboard-providers
        - name: grafana-dashboards
          configMap:
            name: grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: plex
spec:
  type: LoadBalancer
  selector:
    app: grafana
  ports:
    - port: 30902
      targetPort: 3000
